url: https://blmoran.github.io/bayesma/

search:
  type: overlay

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary:   "#3191bf"
    secondary: "#4F6D8A"
    success:   "#9FD8F5"
    info:      "#EAF4FB"
    warning:   "#E8D9A8"
    danger:    "#2E3A4A"
    light:     "#F7FBFF"
    dark:      "#2E3A4A"

    bg: "#FFFFFF"
    fg: "#2E3A4A"

    base_font:
      google: "Open Sans"
    heading_font:
      google: "Montserrat"
    code_font:
      google: "Source Code Pro"

    navbar-bg: "#4F6D8A"
    navbar-light-color: "#EAF4FB"
    navbar-light-hover-color: "#FFFFFF"
    navbar-light-active-color: "#FFFFFF"

navbar:
  bg: primary
  type: dark
  brand:
    title: "bayesma"
    href: "index.html"
  structure:
