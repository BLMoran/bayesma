<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 912" width="800" height="912">

  <defs>
    <!-- Arrowhead marker -->
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4F6D8A"/>
    </marker>
    <!-- Dashed arrowhead (same, used on loop) -->
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4F6D8A"/>
    </marker>
  </defs>

  <!-- ── Background ───────────────────────────────────────────────── -->
  <rect width="800" height="912" fill="#F7FBFF"/>

  <!-- ── Title ────────────────────────────────────────────────────── -->
  <text x="400" y="30"
        text-anchor="middle"
        font-family="'Montserrat','Open Sans',Arial,sans-serif"
        font-size="15" font-weight="700" fill="#2E3A4A">
    bayesma — Meta-Analysis Workflow
  </text>
  <line x1="80" y1="42" x2="720" y2="42" stroke="#3191bf" stroke-width="1" opacity="0.4"/>

  <!-- ════════════════════════════════════════════════════════════════
       STEP 1  ·  Data Preparation, Trustworthiness & Quality
       y=50, h=106
       ════════════════════════════════════════════════════════════════ -->
  <rect x="80" y="50" width="640" height="106" rx="6"
        fill="#EAF4FB" stroke="#3191bf" stroke-width="1.5"/>
  <!-- header (rounded top, flat bottom via clip trick) -->
  <path d="M 86 50 Q 80 50 80 56 L 80 78 L 720 78 L 720 56 Q 720 50 714 50 Z"
