  <!-- row 1: one-call interface -->
  <text x="104" y="323" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">bayesma()</text>
  <text x="255" y="323" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">bayesma_mv()</text>
  <text x="415" y="323" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">meta_reg()</text>
  <text x="558" y="323" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">robma()</text>
  <!-- row 2: modular pipeline -->
  <text x="104" y="343" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">bayesma_spec()</text>
  <text x="268" y="343" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#7A8A9A">→</text>
  <text x="282" y="343" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">bayesma_stan_code()</text>
  <text x="466" y="343" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#7A8A9A">→</text>
  <text x="480" y="343" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">bayesma_fit()</text>

  <!-- arrow 3 → diamond -->
  <line x1="400" y1="360" x2="400" y2="374"
        stroke="#4F6D8A" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════════════════════════════
       CONVERGENCE DIAMOND
       center (400, 413), half-w=165, half-h=35
       top=378, bottom=448, left=235, right=565
       ════════════════════════════════════════════════════════════════ -->
  <polygon points="400,378 565,413 400,448 235,413"
           fill="#FFF3CD" stroke="#4F6D8A" stroke-width="1.5"/>
  <text x="400" y="408" text-anchor="middle"
        font-family="'Montserrat','Open Sans',Arial,sans-serif"
        font-size="11" font-weight="700" fill="#4F6D8A">Converged?</text>
  <text x="400" y="423" text-anchor="middle"
        font-family="'Source Code Pro','Courier New',monospace"
        font-size="10" fill="#5A6A7A">diagnostics()</text>

  <!-- arrow YES (bottom of diamond → step 4) -->
  <line x1="400" y1="448" x2="400" y2="460"
        stroke="#4F6D8A" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="408" y="457"
        font-family="'Montserrat','Open Sans',Arial,sans-serif"
        font-size="10" font-weight="600" fill="#4F6D8A">Yes</text>

  <!-- arrow NO (left of diamond → back to step 3) dashed -->
  <path d="M 235 413 L 50 413 L 50 306 L 80 306"
        stroke="#4F6D8A" stroke-width="2" fill="none"
        stroke-dasharray="6,4" marker-end="url(#arrow-dash)"/>
  <text x="228" y="408" text-anchor="end"
        font-family="'Montserrat','Open Sans',Arial,sans-serif"
        font-size="10" font-weight="600" fill="#4F6D8A">No</text>
  <!-- "Revise model" label on the vertical segment, rotated -->
  <text transform="rotate(-90, 62, 360)" x="62" y="360"
        text-anchor="middle"
        font-family="'Open Sans',Arial,sans-serif"
        font-size="9.5" fill="#4F6D8A">Revise model</text>

