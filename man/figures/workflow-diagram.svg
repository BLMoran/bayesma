  <text x="556" y="611" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">egger_output()</text>
  <!-- row 2 -->
  <text x="104" y="631" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">robma()</text>
  <text x="238" y="631" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">robma_table()</text>
  <text x="416" y="631" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">robma_sensitivity()</text>
  <text x="620" y="631" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#7A8A9A">...</text>

  <!-- arrow 5 → 6 -->
  <line x1="400" y1="648" x2="400" y2="660"
        stroke="#4F6D8A" stroke-width="2" marker-end="url(#arrow)"/>

