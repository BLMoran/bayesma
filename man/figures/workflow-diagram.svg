  <text x="104" y="580"
        font-family="'Montserrat','Open Sans',Arial,sans-serif"
        font-size="10.5" font-weight="700" fill="#9FD8F5">STEP 5</text>
  <text x="148" y="580"
        font-family="'Montserrat','Open Sans',Arial,sans-serif"
        font-size="10.5" fill="white">·  Publication Bias Assessment</text>
  <!-- row 1 -->
  <text x="104" y="611" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">funnel_plot()</text>
