  <text x="148" y="68"
        font-family="'Montserrat','Open Sans',Arial,sans-serif"
        font-size="10.5" fill="white">
    ·  Data Preparation, Trustworthiness &amp; Quality Assessment
  </text>
  <!-- row 1 -->
  <text x="104" y="99"  font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">inspect_sr()</text>
  <text x="278" y="99"  font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">inspect_sr_table()</text>
  <text x="488" y="99"  font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">inspect_plot()</text>
  <!-- row 2 -->
  <text x="104" y="119" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">bayes_carlisle_test()</text>
  <text x="348" y="119" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">bayes_grim_test()</text>
  <text x="558" y="119" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">primed()</text>
  <!-- row 3 -->
  <text x="104" y="139" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">rob_plot()</text>
  <text x="278" y="139" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">filter_trustworthy()</text>
  <text x="488" y="139" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">inspect_summary_plot()</text>

  <!-- arrow 1 → 2 -->
  <line x1="400" y1="156" x2="400" y2="170"
        stroke="#4F6D8A" stroke-width="2" marker-end="url(#arrow)"/>

