  <text x="278" y="243" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">prior_copas()</text>
  <text x="460" y="243" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">ecdf_prior_plot()</text>

