  <text x="316" y="531" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">compare_table()</text>
  <text x="506" y="531" font-family="'Source Code Pro','Courier New',monospace" font-size="10.5" fill="#2E3A4A">compare_plot()</text>

